name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check backend/src tests

      - name: Ruff format check
        run: uv run ruff format --check backend/src tests

      - name: Mypy typecheck
        run: uv run mypy backend/src/analytics_agent

  backend-test:
    name: Backend — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v

  # ── Playwright e2e ──────────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Run e2e tests
        run: npx --prefix frontend playwright test --config tests/e2e/playwright.config.ts

  # ── Helm chart ──────────────────────────────────────────────────────────────
  helm-chart:
    name: Helm — lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.0

      - name: Lint chart
        run: helm lint helm/analytics-agent/

      - name: Render templates
        run: |
          helm template test-release helm/analytics-agent/ \
            --set image.repository=analytics-agent \
            --set image.tag=test \
            > /tmp/rendered.yaml

      - name: Verify port consistency (Dockerfile EXPOSE vs Helm targetPort)
        run: |
          DOCKERFILE_PORT=$(grep '^EXPOSE' docker/Dockerfile | awk '{print $2}')
          HELM_PORT=$(grep 'targetPort:' helm/analytics-agent/values.yaml | awk '{print $2}')
          echo "Dockerfile EXPOSE: $DOCKERFILE_PORT"
          echo "Helm targetPort:   $HELM_PORT"
          [ "$DOCKERFILE_PORT" = "$HELM_PORT" ] || \
            { echo "ERROR: port mismatch — update helm/analytics-agent/values.yaml"; exit 1; }

      - name: Verify hook ordering (SA and Secret weight < bootstrap Job weight)
        run: |
          pip install -q pyyaml
          python3 - <<'PYEOF'
          import sys, yaml

          docs = list(yaml.safe_load_all(open("/tmp/rendered.yaml")))
          hooks = {}
          for doc in docs:
              if not doc:
                  continue
              ann = (doc.get("metadata") or {}).get("annotations") or {}
              if "pre-install" in ann.get("helm.sh/hook", ""):
                  hooks[doc["kind"]] = int(ann.get("helm.sh/hook-weight", 0))

          print("Hook weights:", hooks)
          sa, secret, job = hooks.get("ServiceAccount"), hooks.get("Secret"), hooks.get("Job")
          assert sa is not None, "ServiceAccount must be a hook"
          assert secret is not None, "Secret must be a hook"
          assert job is not None, "bootstrap Job must be a hook"
          assert sa < job,     f"ServiceAccount weight ({sa}) must be < Job ({job})"
          assert secret < job, f"Secret weight ({secret}) must be < Job ({job})"
          print("Hook ordering OK")
          PYEOF

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — typecheck & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck + build
        run: pnpm build

      - name: ESLint
        run: pnpm lint
